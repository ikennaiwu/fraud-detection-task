<!DOCTYPE html>
<html>
<head>
  <title>Fraud Detection Dashboard</title>

  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 20px;
      background: #f5f6fa;
    }

    h1 {
      text-align: center;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      margin-top: 20px;
      background: white;
    }

    th, td {
      border: 1px solid #ddd;
      padding: 10px;
      text-align: center;
    }

    th {
      background: #2c3e50;
      color: white;
    }

    .valid {
      color: green;
      font-weight: bold;
    }

    .invalid {
      color: red;
      font-weight: bold;
    }

    .section {
      margin-top: 30px;
      padding: 15px;
      background: white;
      border-radius: 5px;
    }
  </style>
</head>

<body>

<h1>🚨 Fraud Detection — Live Walkthrough</h1>

<!-- TRANSACTION TABLE -->
<div class="section">
  <h2>Transaction Log</h2>

  <table id="table">
    <thead>
      <tr>
        <th>ID</th>
        <th>Sender</th>
        <th>Receiver</th>
        <th>Amount</th>
        <th>Time (s)</th>
        <th>Status</th>
      </tr>
    </thead>

    <tbody id="tbody">
      <!-- rows will be inserted dynamically -->
    </tbody>
  </table>
</div>

<!-- SUMMARY -->
<div class="section">
  <h2>Results</h2>

  <p>Total transactions: <span id="total">0</span></p>
  <p>Valid: <span id="valid">0</span></p>
  <p>Invalid: <span id="invalid">0</span></p>
  <p>Unique senders: <span id="senders">0</span></p>
</div>

<!-- VELOCITY -->
<div class="section">
  <h2>Velocity Window (last 60s)</h2>
  <ul id="velocity"></ul>
</div>

<script src="/socket.io/socket.io.js"></script>
<script src="script.js"></script>

</body>
</html>
